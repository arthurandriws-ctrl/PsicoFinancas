<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="caminho-da-imagem/favicon.png">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='%230d6efd' viewBox='0 0 16 16'%3E%3Cpath fill-rule='evenodd' d='M0 0h1v15h15v1H0zm10 3.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0V4.9l-3.613 4.417a.5.5 0 0 1-.74.037L7.06 6.767l-3.656 5.027a.5.5 0 0 1-.808-.588l4-5.5a.5.5 0 0 1 .758-.06l2.609 2.61L13.445 4H10.5a.5.5 0 0 1-.5-.5'/%3E%3C/svg%3E">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='cadastro.css') }}">
    <title>Cadastro</title>
</head>

<body>
<!-- Card principal -->
<div class="register-card">

    <!-- Ícone -->
    <div class="logo"></div>

    <!-- Título -->
    <h1 class="title">
        Criar Conta
    </h1>

    <!-- Subtítulo -->
    <p class="subtitle">
        Preencha os dados para se cadastrar
    </p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <!-- Formulário -->
    <form id="cadastroForm" action="{{ url_for('register') }}" method="post">

        <!-- Nome -->
        <div class="form-group">

            <label for="nome">Nome Completo</label>

            <input
                type="text"
                name="nome"
                id="nome"
                class="form-control"
                placeholder="Digite seu nome"
                required>

        </div>

        <!-- Linha com 2 campos -->
        <div class="row">

            <!-- Email -->
            <div class="form-group">

                <label for="email">E-mail</label>

                <input
                    type="email"
                    name="email"
                    id="email"
                    class="form-control"
                    placeholder="Digite seu e-mail"
                    required>

            </div>

            <!-- Telefone -->
            <div class="form-group">

                <label for="telefone">Telefone</label>

                <input
                    type="tel"
                    name="telefone"
                    id="telefone"
                    class="form-control"
                    placeholder="(11) 99999-9999"
                    maxlength="15"
                    inputmode="numeric"
                    pattern="\(\d{2}\) \d{5}-\d{4}">

            </div>

        </div>

        <!-- Linha com duas colunas -->
        <div class="row">

            <!-- Senha -->
            <div class="form-group">

                <label for="senha">Senha</label>

                <input
                    type="password"
                    name="senhaForm"
                    id="senha"
                    class="form-control"
                    placeholder="Digite sua senha"
                    required>

            </div>

            <!-- Confirmar senha -->
            <div class="form-group">

                <label for="confirmarSenha">Confirmar Senha</label>

                <input
                    type="password"
                    name="confirmarSenha"
                    id="confirmarSenha"
                    class="form-control"
                    placeholder="Confirme sua senha"
                    required>

            </div>

        </div>

        <!-- Checkbox -->
        <div class="terms">

            <input type="checkbox" id="termos" name="termos" required>

            <span>
                Aceito os
                <a href="termos.html">
                    Termos de Uso
                </a>
            </span>

        </div>

        <!-- Botão -->
        <button
            type="submit"
            class="btn-register">

            Criar Conta

        </button>

    </form>

    <!-- Link para login -->
    <div class="login-link">

        Já possui uma conta?

        <a href="{{ url_for('main') }}">
            Fazer Login
        </a>

    </div>

</div>

<script>
    const telefoneInput = document.getElementById('telefone');

    function formatTelefone(value) {
        const digits = value.replace(/\D/g, '').slice(0, 11);
        if (digits.length <= 2) return digits;
        if (digits.length <= 7) {
            return `(${digits.slice(0, 2)}) ${digits.slice(2)}`;
        }
        return `(${digits.slice(0, 2)}) ${digits.slice(2, 7)}-${digits.slice(7)}`;
    }

    telefoneInput.addEventListener('input', function (event) {
        const cursorPosition = event.target.selectionStart;
        event.target.value = formatTelefone(event.target.value);
        event.target.setSelectionRange(event.target.value.length, event.target.value.length);
    });

    telefoneInput.addEventListener('paste', function (event) {
        event.preventDefault();
        const paste = (event.clipboardData || window.clipboardData).getData('text');
        event.target.value = formatTelefone(paste);
    });
</script>

</body>
</html>

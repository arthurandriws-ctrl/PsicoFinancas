<body>

<div class="container">

    <!-- Cabeçalho -->

    <div class="header">

        <h1>Mapeamento de Perfil Financeiro</h1>

        <p>
            Responda algumas perguntas para entendermos melhor seu perfil financeiro e objetivos
        </p>

    </div>

    <!-- Card -->

    <div class="card">

        <h2> Objetivos Financeiros</h2>

        <!-- Pergunta 12 (Objetivos) -->

        <div class="grupo">

            <label class="titulo">
                Qual seu principal objetivo financeiro de longo prazo?
            </label>

            <div class="opcao">
                <input type="checkbox">
                <span>Formar reserva de emergência</span>
            </div>

            <div class="opcao">
                <input type="checkbox">
                <span>Comprar um imóvel</span>
            </div>

            <div class="opcao">
                <input type="checkbox">
                <span>Planejar aposentadoria</span>
            </div>

            <div class="opcao">
                <input type="checkbox">
                <span>Educação própria ou dos filhos</span>
            </div>

            <div class="opcao">
                <input type="checkbox">
                <span>Viajar ou lazer</span>
            </div>

        </div>

        <!-- Pergunta 13 (Perfil de risco) -->

        <div class="grupo">

            <label class="titulo">
                Qual descrição melhor representa seu perfil de investidor?
            </label>

    

        <!-- Pergunta 14 (Prazo) -->

        <div class="grupo">

            <label class="titulo">
                Em quanto tempo pretende atingir seus principais objetivos financeiros?
            </label>

            <select>
                <option>Selecione</option>
                <option>Menos de 1 ano</option>
                <option>1 a 3 anos</option>
                <option>3 a 5 anos</option>
                <option>5 a 10 anos</option>
                <option>Mais de 10 anos</option>
            </select>

        </div>

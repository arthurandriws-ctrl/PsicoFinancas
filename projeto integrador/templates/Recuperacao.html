<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="caminho-da-imagem/favicon.png">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='%230d6efd' viewBox='0 0 16 16'%3E%3Cpath fill-rule='evenodd' d='M0 0h1v15h15v1H0zm10 3.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0V4.9l-3.613 4.417a.5.5 0 0 1-.74.037L7.06 6.767l-3.656 5.027a.5.5 0 0 1-.808-.588l4-5.5a.5.5 0 0 1 .758-.06l2.609 2.61L13.445 4H10.5a.5.5 0 0 1-.5-.5'/%3E%3C/svg%3E">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='recuperacao.css') }}">
    <title>Recuperar Senha</title>
</head>

<body>

<!-- Card principal -->
<div class="forgot-card">

    <!-- Ícone -->
    <div class="logo"></div>

    <!-- Título -->
    <h1 class="title">
        Esqueceu sua senha?
    </h1>

    <!-- Texto explicativo -->
    <p class="subtitle">
        Informe seu e-mail cadastrado e enviaremos
        um link para redefinição da senha.
    </p>

    <!-- Formulário -->
    <form id="recuperacaoForm">

        <!-- Campo E-mail -->
        <div class="form-group">

            <label for="email">
                E-mail
            </label>

            <input
                type="email"
                id="email"
                class="form-control"
                placeholder="Digite seu e-mail">

        </div>

        <!-- Botão -->
        <button
            type="submit"
            class="btn-send">

            Enviar Link de Recuperação

        </button>

    </form>

    <!-- Voltar -->
    <div class="back-login">

        Lembrou sua senha?

        <a href="index.html">
            Voltar para Login
        </a>

    </div>

</div>

<script>

    document.getElementById("recuperacaoForm").addEventListener("submit", function(event){

        event.preventDefault();

        const emailDigitado = document.getElementById("email").value.trim();

        if(emailDigitado === ""){
            alert("Digite seu e-mail!");
            return;
        }

        const usuario = JSON.parse(localStorage.getItem("usuario"));

        if(!usuario){
            alert("Nenhum usuário cadastrado no sistema!");
            return;
        }

        if(emailDigitado === usuario.email){

            alert(
                "Link de recuperação enviado para: " +
                emailDigitado +
                "\\n\\n(Simulação usando JavaScript)"
            );

            window.location.href = "index.html";

        } else {

            alert("E-mail não encontrado!");

        }

    });

</script>

</body>

</html>
